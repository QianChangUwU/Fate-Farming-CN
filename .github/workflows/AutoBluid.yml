name: AutoBuild

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/workflows/**"
      - "README.md"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate unique tag
        run: |
          export TZ="Asia/Shanghai"
          TAG_NAME="Fate_Farming_3.1.5_CN-1.4.1_$(date +'%Y%m%d_%H%M%S')"
          echo "TAG=$TAG_NAME" >> $GITHUB_ENV
          echo "CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "DATE_STAMP=$(date +'%Y%m%d')" >> $GITHUB_ENV

      # 修复：只删除超过 5 个的旧 Release，保留最近几个
      - name: Cleanup old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有匹配的 Release，按创建时间排序，保留最新的 5 个
          echo "Current new tag: ${{ env.TAG }}"

          # 获取所有 tag，排除当前新的，保留最新的 5 个
          ALL_TAGS=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName' | \
            grep "Fate_Farming" | \
            grep -v "${{ env.TAG }}")

          # 保留最新的 5 个，删除其余的
          COUNT=0
          echo "$ALL_TAGS" | while read -r OLD_TAG; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 1 ]; then
              echo "Deleting old release (keeping only last 1): $OLD_TAG"
              gh release delete "$OLD_TAG" --yes --cleanup-tag || echo "Failed to delete $OLD_TAG"
            else
              echo "Keeping release: $OLD_TAG"
            fi
          done

      - name: Create ZIP archive
        run: |
          ZIP_NAME="${{ env.TAG }}.zip"
          zip -r "$ZIP_NAME" . -x '.git/*' -x '.github/*'
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_NAME }}
          tag_name: ${{ env.TAG }}
          name: "自动构建 - ${{ env.TAG }}"
          body: "构建时间：${{ env.CURRENT_TIME }}"
          generate_release_notes: false
